<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CINFRA — Consorcio Infraestructura</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --cream: #F5F1E8;
    --bone:  #EFE8D6;
    --paper: #F8F5EE;
    --ink:   #163A43;
    --ink-2: #0E2A31;
    --ink-55: rgba(22,58,67,0.55);
    --ink-65: rgba(22,58,67,0.65);
    --ink-75: rgba(22,58,67,0.75);
    --ink-10: rgba(22,58,67,0.10);
    --ink-08: rgba(22,58,67,0.08);
    --ink-12: rgba(22,58,67,0.12);
    --serif: "Cormorant Garamond", "Times New Roman", serif;
    --sans:  "Inter", system-ui, -apple-system, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.015em; }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-55);
    font-weight: 500;
  }

  /* Grain overlay (optional) */
  body.grain::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.06;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.086  0 0 0 0 0.227  0 0 0 0 0.263  0 0 0 1 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  body.paper {
    background: var(--paper);
    background-image:
      radial-gradient(rgba(22,58,67,0.04) 1px, transparent 1px);
    background-size: 22px 22px;
  }

  /* reveal primitives */
  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.d1 { transition-delay: .08s; }
  .reveal.d2 { transition-delay: .16s; }
  .reveal.d3 { transition-delay: .24s; }
  .reveal.d4 { transition-delay: .32s; }
  .reveal.d5 { transition-delay: .40s; }

  .split-word { display: inline-block; vertical-align: baseline; clip-path: inset(-0.15em -0.15em -0.05em -0.15em); }
  .split-word > span { display: inline-block; transform: translateY(110%); transition: transform 1.1s cubic-bezier(.2,.7,.2,1); padding: 0 0.04em; margin: 0 -0.04em; }
  .split-word.in { clip-path: none; }
  .split-word.in > span { transform: translateY(0); }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script>
  /* Tweakable defaults, persisted by host */
  window.__TWEAKS = /*EDITMODE-BEGIN*/{

    "alternation": "cream",
    "imagery": "on"
  }/*EDITMODE-END*/;
</script>

</html>
